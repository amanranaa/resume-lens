version: '3.8'

services:
  # Flask Web Application
  web:
    build: .
    container_name: resumelens_web
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - DATABASE_URL=postgresql://resumelens:resumelens_password@db:5432/resumelens
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=http://localhost:5000/auth/google/callback
      - PREFERRED_URL_SCHEME=http
      - SERVER_NAME=localhost:5000
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./:/app
    networks:
      - resumelens_network
    restart: unless-stopped

  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: resumelens_db
    environment:
      - POSTGRES_USER=resumelens
      - POSTGRES_PASSWORD=resumelens_password
      - POSTGRES_DB=resumelens
      - POSTGRES_INITDB_ARGS=--encoding=UTF8
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - resumelens_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U resumelens"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local

networks:
  resumelens_network:
    driver: bridge
