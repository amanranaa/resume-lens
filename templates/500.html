{% extends "base.html" %}

{% block title %}Server Error - ResumeLens{% endblock %}

{% block content %}
<div style="min-height: calc(100vh - 300px); display: flex; align-items: center; justify-content: center; padding: 40px 20px;">
    <div style="text-align: center; max-width: 600px;">
        <h1 style="font-size: 120px; margin: 0; color: #c33;">
            500
        </h1>
        <h2 style="font-size: 32px; margin: 20px 0; color: var(--text-primary);">
            Server Error
        </h2>
        <p style="font-size: 18px; color: var(--text-secondary); margin-bottom: 30px; line-height: 1.6;">
            Something went wrong on our end. Our team has been notified and is working to fix it.
        </p>
        <a href="{{ url_for('index') }}" style="display: inline-block; padding: 14px 28px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; text-decoration: none; border-radius: 10px; font-weight: 600; transition: all 0.3s; cursor: pointer;">
            <i class="fas fa-arrow-left"></i> Back to Home
        </a>
    </div>
</div>
{% endblock %}
